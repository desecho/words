[tox]
envlist = py-{pytest,mypy,ruff}
skipsdist = True
isolated_build = true

[testenv]
basepython = python3.13
setenv =
    PYTHONPATH = src
sitepackages = false
envdir =
    py-pytest: {toxworkdir}/py-pytest
    py-mypy: {toxworkdir}/py-mypy
    py-ruff: {toxworkdir}/py-ruff
allowlist_externals =
    make
    echo
    uv
    ruff
    mypy

commands_pre =
    uv sync --active

commands =
    requirements: echo "Install requirements"
    pytest: py.test src
    mypy: mypy src --explicit-package-bases
    ruff: ruff check src
