---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: words-backend
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.words.example.com
      secretName: words-backend-tls
  rules:
    - host: api.words.example.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: words-backend
                port:
                  number: 80
