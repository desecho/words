[isort]
combine_as_imports = true
default_section = THIRDPARTY
known_first_party = wordsapp
include_trailing_comma = true
line_length = 119
multi_line_output = 3
skip = src/wordsapp/migrations

[flake8]
exclude = src/wordsapp/migrations/*
max-line-length = 119
statistics = True
# Disable E121, E124, E128 (indentation) because it is handled by pylint.
# Disable E402 (imports) because it is handled by isort.
# Disable E501 because it is handled by black.
# Disable E203, W503 because it conflicts with black.
ignore = E121,E124,E128,E203,E402,E501,W503

[tool:pytest]
python_files = test_*
DJANGO_SETTINGS_MODULE = words.settings_tests
addopts = --cov-report xml --cov-report term-missing --cov src -vv

[mypy]
mypy_path = src
plugins =
    mypy_django_plugin.main
namespace_packages = True
disallow_subclassing_any = False
warn_no_return = True
warn_unreachable = True
local_partial_types = True
pretty = True
strict = True
exclude = (?x)(
    ^src/wordsapp/tests |
    ^src/wordsapp/migrations
    )

[mypy.plugins.django-stubs]
django_settings_module = words.settings

[mypy-rest_framework_simplejwt.*]
ignore_missing_imports = True
